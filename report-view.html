<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Instagram Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --insta-pink: #E4405F;
            --insta-orange: #F58529;
            --insta-yellow: #FCAF45;
            --insta-purple: #833AB4;
            --bg-white: #ffffff;
            --bg-light: #fafafa;
            --border-light: #dbdbdb;
            --text-dark: #262626;
            --text-grey: #8e8e8e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .report-header {
            background: linear-gradient(135deg, var(--insta-orange), var(--insta-pink));
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(228, 64, 95, 0.2);
        }

        .report-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .report-date {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .report-id {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 8px;
            font-family: monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid var(--border-light);
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-grey);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--insta-pink);
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid var(--border-light);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid var(--border-light);
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-dark);
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .perf-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .perf-card {
            background: linear-gradient(135deg, #fff5f7, #fff);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .perf-icon { font-size: 2rem; margin-bottom: 12px; }
        .perf-title { font-weight: 600; margin-bottom: 12px; font-size: 0.9rem; }
        .perf-value { font-size: 1.6rem; font-weight: 700; color: var(--insta-pink); }
        .perf-sub { font-size: 0.75rem; color: var(--text-grey); margin-top: 4px; }

        .posts-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .posts-table th,
        .posts-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        .posts-table th {
            font-weight: 600;
            color: var(--text-grey);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .posts-table tr:hover {
            background: var(--bg-light);
        }

        .post-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .post-type.reel { background: #ffebef; color: #E4405F; }
        .post-type.carrossel { background: #fff4e6; color: #F58529; }
        .post-type.imagem { background: #e8f4ff; color: #4285F4; }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-grey);
        }

        .no-data-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, var(--insta-orange), var(--insta-pink));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(228, 64, 95, 0.3);
        }

        .actions-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .watermark {
            text-align: center;
            padding: 20px;
            color: var(--text-grey);
            font-size: 0.8rem;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            .section { break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="reportContent">
            <div class="no-data">
                <div class="no-data-icon">📊</div>
                <h2>Nenhum relatório encontrado</h2>
                <p>Este link não contém dados válidos ou o relatório expirou.</p>
            </div>
        </div>

        <div class="watermark no-print">
            📊 Relatório gerado via Insight Dash
        </div>
    </div>

    <script>
        // ============================================================
        // COMPRESSÃO LZW (mesma do dashboard.html)
        // ============================================================
        function lzwDecompress(str) {
            const data = str.split('').map(c => c.charCodeAt(0));
            const dict = {};
            let currChar = String.fromCharCode(data[0]);
            let oldPhrase = currChar;
            const out = [currChar];
            let code = 256;
            let phrase;
            for (let i = 1; i < data.length; i++) {
                const currCode = data[i];
                if (currCode < 256) {
                    phrase = String.fromCharCode(currCode);
                } else {
                    phrase = dict[currCode] ? dict[currCode] : (oldPhrase + currChar);
                }
                out.push(phrase);
                currChar = phrase.charAt(0);
                dict[code] = oldPhrase + currChar;
                code++;
                oldPhrase = phrase;
            }
            return out.join('');
        }

        // Descompactar dados da URL (compatível com LZW + base64 URL-safe)
        function decompressData(compressed) {
            try {
                // Reverter URL-safe para base64 padrão
                let base64 = compressed.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) base64 += '=';
                const comprimido = atob(base64);
                // Tentar descomprimir LZW
                const jsonString = lzwDecompress(comprimido);
                return JSON.parse(jsonString);
            } catch (e) {
                // Fallback: base64 simples (formato antigo)
                try {
                    const jsonString = atob(compressed);
                    return JSON.parse(jsonString);
                } catch (e2) {
                    return null;
                }
            }
        }

        // ============================================================
        // NORMALIZAR DADOS (formato antigo e novo)
        // ============================================================
        function normalizarDados(data) {
            if (!data) return null;
            
            // Formato novo (chaves curtas)
            if (data.m && !data.metrics) {
                return {
                    id: data.id || ('R' + Math.random().toString(36).substr(2, 6).toUpperCase()),
                    date: data.d || new Date().toISOString(),
                    metrics: {
                        alcance: data.m.a || 0,
                        impressoes: data.m.i || 0,
                        engajamento: data.m.e || 0,
                        taxa: data.m.t || 0,
                        seguidores: data.m.s || 0,
                        cliques: data.m.c || 0
                    },
                    reelsTotal: data.rt || 0,
                    postsTotal: data.pt || 0,
                    storiesTotal: data.st || 0,
                    posts: (data.p || []).map(p => ({
                        tipo: p.tp || 'imagem',
                        legenda: p.l || '',
                        alcance: p.a || 0,
                        engajamento: p.e || 0,
                        taxa: p.tx || 0
                    }))
                };
            }
            
            // Formato antigo
            return data;
        }

        // Formatar números
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString('pt-BR');
        }

        // Formatar data
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Renderizar relatório
        function renderReport(data) {
            const content = document.getElementById('reportContent');
            
            // Normalizar dados (suporta formato novo e antigo)
            data = normalizarDados(data);
            
            if (!data || !data.metrics) {
                content.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">⚠️</div>
                        <h2>Dados inválidos</h2>
                        <p>Não foi possível carregar o relatório.</p>
                    </div>
                `;
                return;
            }

            const reportId = data.id || 'REL-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            const reportDate = data.date ? formatDate(data.date) : formatDate(new Date());

            // Ordenar posts
            const sortedPosts = (data.posts || []).sort((a, b) => (b.alcance || 0) - (a.alcance || 0));
            const topPosts = sortedPosts.slice(0, 10);
            const bottomPosts = sortedPosts.slice(-10).reverse();

            content.innerHTML = `
                <div class="report-header">
                    <h1>📊 Relatório Instagram Insights</h1>
                    <div class="report-date">${reportDate}</div>
                    <div class="report-id">ID: ${reportId}</div>
                </div>

                <div class="actions-bar no-print">
                    <button class="btn-download" onclick="window.print()">
                        🖨️ Imprimir / Salvar PDF
                    </button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-icon">📢</span>
                        <div class="stat-label">Alcance Total</div>
                        <div class="stat-value">${formatNumber(data.metrics.alcance)}</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">👁️</span>
                        <div class="stat-label">Impressões</div>
                        <div class="stat-value">${formatNumber(data.metrics.impressoes)}</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">❤️</span>
                        <div class="stat-label">Engajamento</div>
                        <div class="stat-value">${formatNumber(data.metrics.engajamento)}</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">📈</span>
                        <div class="stat-label">Taxa Engajamento</div>
                        <div class="stat-value">${(data.metrics.taxa || 0).toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">👥</span>
                        <div class="stat-label">Novos Seguidores</div>
                        <div class="stat-value">${formatNumber(data.metrics.seguidores)}</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">🔗</span>
                        <div class="stat-label">Cliques no Link</div>
                        <div class="stat-value">${formatNumber(data.metrics.cliques)}</div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-box">
                        <div class="chart-title">📊 Alcance por Tipo de Conteúdo</div>
                        <div class="chart-container">
                            <canvas id="chartBar"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">🎨 Distribuição de Posts</div>
                        <div class="chart-container">
                            <canvas id="chartDoughnut"></canvas>
                        </div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-box">
                        <div class="chart-title">📈 Comparativo de Alcance</div>
                        <div class="chart-container">
                            <canvas id="chartComparison"></canvas>
                        </div>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">🎯 Taxa de Engajamento</div>
                        <div class="chart-container">
                            <canvas id="chartEngagement"></canvas>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🎬 Performance por Formato</div>
                    <div class="perf-row">
                        <div class="perf-card">
                            <div class="perf-icon">🎬</div>
                            <div class="perf-title">Vídeo Curto (Reels)</div>
                            <div class="perf-value">${formatNumber(data.reelsTotal || 0)}</div>
                            <div class="perf-sub">Alcance total</div>
                        </div>
                        <div class="perf-card">
                            <div class="perf-icon">🎠</div>
                            <div class="perf-title">Carrossel</div>
                            <div class="perf-value">${formatNumber(data.postsTotal || 0)}</div>
                            <div class="perf-sub">Alcance total</div>
                        </div>
                        <div class="perf-card">
                            <div class="perf-icon">🖼️</div>
                            <div class="perf-title">Imagem Única</div>
                            <div class="perf-value">${formatNumber(data.storiesTotal || 0)}</div>
                            <div class="perf-sub">Alcance total</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">🏆 Top 10 Posts do Período</div>
                    <table class="posts-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Tipo</th>
                                <th>Legenda</th>
                                <th>Alcance</th>
                                <th>Engajamento</th>
                                <th>Taxa</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${topPosts.map((p, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><span class="post-type ${p.tipo}">${p.tipo}</span></td>
                                    <td>${p.legenda || '-'}</td>
                                    <td>${formatNumber(p.alcance)}</td>
                                    <td>${formatNumber(p.engajamento)}</td>
                                    <td>${(p.taxa || 0).toFixed(1)}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                ${bottomPosts.length > 0 ? `
                <div class="section">
                    <div class="section-title">📉 Posts com Menor Performance</div>
                    <table class="posts-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Tipo</th>
                                <th>Legenda</th>
                                <th>Alcance</th>
                                <th>Engajamento</th>
                                <th>Taxa</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bottomPosts.map((p, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><span class="post-type ${p.tipo}">${p.tipo}</span></td>
                                    <td>${p.legenda || '-'}</td>
                                    <td>${formatNumber(p.alcance)}</td>
                                    <td>${formatNumber(p.engajamento)}</td>
                                    <td>${(p.taxa || 0).toFixed(1)}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                ` : ''}
            `;

            // Inicializar gráficos
            initCharts(data);
        }

        // Inicializar gráficos
        function initCharts(data) {
            const reels = data.reelsTotal || 0;
            const posts = data.postsTotal || 0;
            const stories = data.storiesTotal || 0;

            // Gráfico de barras
            new Chart(document.getElementById('chartBar'), {
                type: 'bar',
                data: {
                    labels: ['Reels', 'Posts', 'Stories'],
                    datasets: [{
                        data: [reels, posts, stories],
                        backgroundColor: ['rgba(228,64,95,0.85)','rgba(245,133,41,0.85)','rgba(252,175,69,0.85)'],
                        borderColor: ['#E4405F','#F58529','#FCAF45'],
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Contar posts por tipo
            const postsByType = {
                reels: (data.posts || []).filter(p => p.tipo === 'reel').length,
                carousel: (data.posts || []).filter(p => p.tipo === 'carrossel').length,
                imagem: (data.posts || []).filter(p => p.tipo === 'imagem').length
            };

            // Doughnut
            new Chart(document.getElementById('chartDoughnut'), {
                type: 'doughnut',
                data: {
                    labels: ['Reels', 'Carrossel', 'Imagem'],
                    datasets: [{
                        data: [postsByType.reels, postsByType.carousel, postsByType.imagem],
                        backgroundColor: ['rgba(228,64,95,0.85)','rgba(245,133,41,0.85)','rgba(66,133,244,0.85)'],
                        borderColor: ['#fff','#fff','#fff'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            // Comparativo de alcance
            new Chart(document.getElementById('chartComparison'), {
                type: 'bar',
                data: {
                    labels: ['Reels', 'Carrossel', 'Imagem'],
                    datasets: [{
                        label: 'Alcance',
                        data: [reels, posts, stories],
                        backgroundColor: ['rgba(228,64,95,0.75)','rgba(245,133,41,0.75)','rgba(66,133,244,0.75)'],
                        borderColor: ['#E4405F', '#F58529', '#4285F4'],
                        borderWidth: 0,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Taxa de engajamento por tipo
            const calcAvg = (arr, key) => {
                const filtered = arr.filter(p => p[key] > 0);
                return filtered.length ? filtered.reduce((a, b) => a + b[key], 0) / filtered.length : 0;
            };

            const engagementByType = [
                calcAvg((data.posts || []).filter(p => p.tipo === 'reel'), 'taxa'),
                calcAvg((data.posts || []).filter(p => p.tipo === 'carrossel'), 'taxa'),
                calcAvg((data.posts || []).filter(p => p.tipo === 'imagem'), 'taxa')
            ];

            new Chart(document.getElementById('chartEngagement'), {
                type: 'line',
                data: {
                    labels: ['Reels', 'Carrossel', 'Imagem'],
                    datasets: [{
                        label: 'Taxa de Engajamento (%)',
                        data: engagementByType,
                        borderColor: '#E4405F',
                        backgroundColor: 'rgba(228, 64, 95, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // LZString decompressor mínimo (compatível com dashboard.html)
        var LZString = (function() {
            var f = String.fromCharCode;
            var keyStrUriSafe = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+-$";
            function decompressFromEncodedURIComponent(input) {
                if (!input) return null;
                try {
                    var compressed = "";
                    for (var i = 0; i < input.length; i += 2) {
                        var c1 = keyStrUriSafe.indexOf(input.charAt(i));
                        var c2 = keyStrUriSafe.indexOf(input.charAt(i + 1));
                        compressed += String.fromCharCode((c1 << 6) | c2);
                    }
                    // Use lzwDecompress to decode
                    return lzwDecompress(compressed);
                } catch (e) {
                    return null;
                }
            }
            return { decompressFromEncodedURIComponent: decompressFromEncodedURIComponent };
        })();

        // OBS: o suporte a links por hash/localStorage foi removido em favor do modo
        // "Somente Visualização" que gera um arquivo HTML read-only para download.
        document.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            // Se alguém acessar com hash, mostrar instruções explicando que o método
            // foi descontinuado e indicar como usar o arquivo HTML gerado.
            document.getElementById('reportContent').innerHTML = `
                <div class="no-data">
                    <div class="no-data-icon">ℹ️</div>
                    <h2>Suporte a links por hash desativado</h2>
                    <p>Este relatório foi gerado usando uma versão anterior que armazenava dados no navegador.
                    Agora, para compartilhar, gere um arquivo HTML no painel (botão "🔒 Somente Visualização")
                    e envie esse arquivo para terceiros. Abra o arquivo HTML em qualquer navegador para ver o relatório.</p>
                </div>
            `;
            return;
        });
    </script>
</body>
</html>
